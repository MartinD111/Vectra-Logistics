version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vectra_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vectra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vectra_password}
      POSTGRES_DB: ${POSTGRES_DB:-vectra_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vectra_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectra_backend
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-vectra_user}:${POSTGRES_PASSWORD:-vectra_password}@postgres:5432/${POSTGRES_DB:-vectra_db}
      - REDIS_URL=redis://redis:6379
      - MATCHING_ENGINE_URL=http://matching-engine:8000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  matching-engine:
    build:
      context: ./services/matching-engine
      dockerfile: Dockerfile
    container_name: vectra_matching_engine
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/matching-engine:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vectra_frontend
    restart: always
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

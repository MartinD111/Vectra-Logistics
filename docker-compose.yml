services:
  postgres:
    image: postgres:15-alpine
    container_name: vectra_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vectra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vectra_password}
      POSTGRES_DB: ${POSTGRES_DB:-vectra_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro
      - ./database/extensions.sql:/docker-entrypoint-initdb.d/2-extensions.sql:ro
      - ./database/migrations/002_realtime_and_documents.sql:/docker-entrypoint-initdb.d/3-realtime.sql:ro
      - ./database/migrations/003_workspaces_and_presets.sql:/docker-entrypoint-initdb.d/4-workspaces.sql:ro
      - ./database/migrations/004_projects_and_programs.sql:/docker-entrypoint-initdb.d/5-projects.sql:ro
      - ./database/migrations/005_ai_config.sql:/docker-entrypoint-initdb.d/6-ai-config.sql:ro
      - ./database/migrations/006_folders.sql:/docker-entrypoint-initdb.d/7-folders.sql:ro
      - ./database/migrations/007_team_assignments_and_roles.sql:/docker-entrypoint-initdb.d/8-team-assignments.sql:ro
      - ./database/migrations/008_kpi_rules.sql:/docker-entrypoint-initdb.d/9-kpi-rules.sql:ro
      - ./database/migrations/009_project_pages.sql:/docker-entrypoint-initdb.d/10-project-pages.sql:ro
      - ./database/migrations/010_calendar_events.sql:/docker-entrypoint-initdb.d/11-calendar-events.sql:ro
      - ./database/migrations/011_email_campaigns.sql:/docker-entrypoint-initdb.d/12-email-campaigns.sql:ro
      - ./database/migrations/012_page_hierarchy.sql:/docker-entrypoint-initdb.d/13-page-hierarchy.sql:ro
      - ./database/migrations/013_page_header.sql:/docker-entrypoint-initdb.d/14-page-header.sql:ro
      - ./database/migrations/014_dispatcher_widgets.sql:/docker-entrypoint-initdb.d/15-dispatcher-widgets.sql:ro
      - ./database/migrations/015_smart_inbox.sql:/docker-entrypoint-initdb.d/16-smart-inbox.sql:ro
      - ./database/migrations/016_yard_management.sql:/docker-entrypoint-initdb.d/17-yard-management.sql:ro
      - ./database/migrations/017_seed_admin_user.sql:/docker-entrypoint-initdb.d/18-seed-admin-user.sql:ro
      - ./database/migrations/018_field_execution.sql:/docker-entrypoint-initdb.d/19-field-execution.sql:ro
      - ./database/migrations/019_crm_billing.sql:/docker-entrypoint-initdb.d/20-crm-billing.sql:ro
      - ./database/migrations/020_ltl_matching.sql:/docker-entrypoint-initdb.d/21-ltl-matching.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vectra_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API (shared by all three frontends) ─────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vectra_api
    restart: always
    command: npm run dev
    environment:
      - NODE_ENV=development
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-vectra_user}:${POSTGRES_PASSWORD:-vectra_password}@postgres:5432/${POSTGRES_DB:-vectra_db}
      - REDIS_URL=redis://redis:6379
      - MATCHING_ENGINE_URL=http://matching-engine:8000
      - JWT_SECRET=${JWT_SECRET:-vectra-dev-secret-key-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-204a7160ec31da5e8aa66cdedaff651050c60f78e62001f6b8790c74bf8cda20}
      - MS_CLIENT_ID=${MS_CLIENT_ID:-}
      - MS_CLIENT_SECRET=${MS_CLIENT_SECRET:-}
      - MS_REDIRECT_URI=${MS_REDIRECT_URI:-}
      - MS_TENANT=${MS_TENANT:-common}
      - WORKSPACES_APP_URL=${WORKSPACES_APP_URL:-http://localhost:3001}
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:8080}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  matching-engine:
    build:
      context: ./services/matching-engine
      dockerfile: Dockerfile
    container_name: vectra_matching_engine
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/matching-engine:/app

  # ── Frontends: one image (monorepo), three services ─────────────────────────
  # Build context is the repo root so the workspace packages are available. Each
  # service runs its own dev script. The cross-app URLs + a shared cookie domain
  # let a single login flow through all three (SSO). In dev the cookie is
  # host-only on localhost (shared across ports); set NEXT_PUBLIC_COOKIE_DOMAIN
  # to the parent domain (e.g. .vectra.app) in production.

  marketplace:
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    container_name: vectra_marketplace
    restart: always
    command: npm run dev:marketplace
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_MARKETPLACE_URL=http://localhost:3000
      - NEXT_PUBLIC_WORKSPACES_URL=http://localhost:3001
      - NEXT_PUBLIC_CMR_URL=http://localhost:3002
    ports:
      - "3000:3000"
    volumes:
      - ./apps:/repo/apps
      - ./packages:/repo/packages
      - /repo/node_modules
      - /repo/apps/marketplace/.next
    depends_on:
      - api

  workspaces:
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    container_name: vectra_workspaces
    restart: always
    command: npm run dev:workspaces
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_MARKETPLACE_URL=http://localhost:3000
      - NEXT_PUBLIC_WORKSPACES_URL=http://localhost:3001
      - NEXT_PUBLIC_CMR_URL=http://localhost:3002
    ports:
      - "3001:3001"
    volumes:
      - ./apps:/repo/apps
      - ./packages:/repo/packages
      - /repo/node_modules
      - /repo/apps/workspaces/.next
    depends_on:
      - api

  cmr:
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    container_name: vectra_cmr
    restart: always
    command: npm run dev:cmr
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_MARKETPLACE_URL=http://localhost:3000
      - NEXT_PUBLIC_WORKSPACES_URL=http://localhost:3001
      - NEXT_PUBLIC_CMR_URL=http://localhost:3002
    ports:
      - "3002:3002"
    volumes:
      - ./apps:/repo/apps
      - ./packages:/repo/packages
      - /repo/node_modules
      - /repo/apps/cmr/.next
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
